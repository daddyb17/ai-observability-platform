name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate Maven Wrapper
        uses: apache/maven-wrapper-validator-action@v3

      - name: Unit and Integration Tests
        run: ./mvnw -B -ntp test

      - name: Build Artifacts
        run: ./mvnw -B -ntp package -DskipTests

  docker-integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate Docker Availability
        run: docker info

      - name: Run Docker-backed Integration Tests
        env:
          RUN_KAFKA_TESTCONTAINER: "true"
          RUN_REDIS_TESTCONTAINER: "true"
          RUN_ELASTIC_TESTCONTAINER: "true"
        run: |
          ./mvnw -B -ntp \
            -pl shared/common-test,services/log-ingestion-service,services/incident-detection-service,services/ai-analysis-service,services/notification-service \
            -am \
            "-Dtest=InfrastructureContainersSmokeTest,LogIndexServiceIntegrationTest,IncidentRuleEngineIntegrationTest,AiAnalysisRequestConsumerIntegrationTest,AlertNotificationRepositoryIntegrationTest" \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test
