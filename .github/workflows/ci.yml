name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate Maven Wrapper
        run: |
          test -f mvnw
          test -f .mvn/wrapper/maven-wrapper.properties
          ./mvnw -v

      - name: Quality Gates (enforcer/verify)
        run: ./mvnw -B -ntp verify -DskipTests

      - name: Unit and Integration Tests
        run: ./mvnw -B -ntp test

      - name: Build Artifacts
        run: ./mvnw -B -ntp package -DskipTests

  docker-integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate Docker Availability
        run: docker info

      - name: Run Docker-backed Integration Tests
        env:
          RUN_KAFKA_TESTCONTAINER: "true"
          RUN_REDIS_TESTCONTAINER: "true"
          RUN_ELASTIC_TESTCONTAINER: "true"
        run: |
          ./mvnw -B -ntp \
            -pl shared/common-test,services/log-ingestion-service,services/incident-detection-service,services/ai-analysis-service,services/notification-service \
            -am \
            "-Dtest=InfrastructureContainersSmokeTest,LogIndexServiceIntegrationTest,IncidentRuleEngineIntegrationTest,AiAnalysisRequestConsumerIntegrationTest,AlertNotificationRepositoryIntegrationTest" \
            -Dsurefire.failIfNoSpecifiedTests=false \
            test

  outage-e2e-scenario:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start Infrastructure
        run: bash ./scripts/start-local.sh

      - name: Start Demo Services
        run: bash ./scripts/start-demo-services.sh

      - name: Run Outage E2E Script
        run: bash ./scripts/e2e-payment-outage-test.sh

      - name: Stop Demo Services
        if: always()
        run: bash ./scripts/stop-demo-services.sh

      - name: Stop Infrastructure
        if: always()
        run: bash ./scripts/stop-local.sh
