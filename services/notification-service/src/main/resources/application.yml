spring:
  application:
    name: notification-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/aiobs}
    username: ${POSTGRES_USER:aiobs}
    password: ${POSTGRES_PASSWORD:aiobs}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      acks: all

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  notifications:
    channels:
      - webhook
      - mock-slack
      - email-sink
    webhook-url: ${NOTIFICATION_WEBHOOK_URL:}
    slack-webhook-url: ${SLACK_WEBHOOK_URL:}
    email-sink-enabled: true
    max-retries: ${NOTIFICATION_MAX_RETRIES:2}
    retry-delay-ms: ${NOTIFICATION_RETRY_DELAY_MS:500}
    query-limit-default: 50
    query-limit-max: 200
    kafka:
      topic-incidents-detected: incidents.detected
      topic-ai-analysis-result: ai.analysis.result
      topic-alerts-outbound: alerts.outbound
      dead-letter-topic: deadletter.alerts
      send-timeout-seconds: 5
      consumer-group-id: notification-service
