spring:
  application:
    name: trace-ingestion-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      acks: all

server:
  port: 8088

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  internal:
    auth-token: ${INTERNAL_API_TOKEN:}
  trace-ingestion:
    jaeger-url: ${JAEGER_URL:http://localhost:16686}
    elasticsearch-url: ${ELASTICSEARCH_URL:http://localhost:9200}
    summary-index: trace-summaries
    topic: traces.raw
    dead-letter-topic: deadletter.traces
    kafka-send-timeout-seconds: 5
    search-limit-default: 20
    search-limit-max: 100
