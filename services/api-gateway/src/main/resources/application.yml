spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  gateway:
    security:
      jwt-secret-base64: ${JWT_SECRET_BASE64:}
    routes:
      auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}
      incident-service-url: ${INCIDENT_SERVICE_URL:http://localhost:8084}
      search-service-url: ${SEARCH_SERVICE_URL:http://localhost:8083}
      metrics-service-url: ${METRICS_SERVICE_URL:http://localhost:8087}
      trace-service-url: ${TRACE_SERVICE_URL:http://localhost:8088}
      notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
    rate-limit:
      login-per-minute: 15
      search-per-minute: 60
      analyze-per-minute: 20
      redis-enabled: ${GATEWAY_REDIS_RATE_LIMIT_ENABLED:true}
    cors:
      allowed-origin-patterns: ${GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173}
